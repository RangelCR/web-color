apiVersion: v1
kind: Service
metadata:
  name: webcolor
spec:
  type: NodePort
  selector:
    app: webcolor
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30000
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: webcolor
spec:
  replicas: 4
  selector:
    matchLabels:
      app: webcolor
  template:
    metadata:
      labels:
        app: webcolor
    spec:
      containers:
        - name: webcolor
          image: fabricioveronez/web-color:green
          ports:
            - containerPort: 80
  strategy:
    canary:
      steps:
        - setWeight: 25
        - pause: {duration: 20s}
        - setWeight: 50
        - pause: {duration: 20s}
        - setWeight: 100