apiVersion: v1
kind: Service
metadata:
  name: webcolor-active
spec:
  type: NodePort
  selector:
    app: webcolor
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30000
---
apiVersion: v1
kind: Service
metadata:
  name: webcolor-preview
spec:
  type: NodePort
  selector:
    app: webcolor
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30001
---      
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: webcolor
spec:
  replicas: 3
  selector:
    matchLabels:
      app: webcolor
  template:
    metadata:
      labels:
        app: webcolor
    spec:
      containers:
        - name: webcolor
          image: fabricioveronez/web-color:green
          ports:
            - containerPort: 80
  strategy:
    blueGreen:
      activeService: webcolor-active
      previewService: webcolor-preview
      autoPromotionEnabled: false
